name: Update MomentumRank Data

on:
  schedule:
    # Every weekday at 07:00 UTC (09:00 Sofia time)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:   # Позволява ръчно стартиране от Actions таб

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yfinance

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml html5lib

      - name: Run fetch_data.py
        run: python fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update momentum data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
