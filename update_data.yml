name: Update MomentumRank Data

on:
  schedule:
    # Всеки делничен ден в 07:30 UTC (10:30 EEST) — след отваряне на пазара
    - cron: "30 7 * * 1-5"
  workflow_dispatch:  # ръчно стартиране от GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # 500 тикера × ~4 сек = ~35 мин

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "yfinance>=0.2.55" \
            "pandas>=2.0" \
            "numpy>=1.24" \
            "requests>=2.31" \
            "lxml" \
            "html5lib"

      - name: Run fetch_data.py
        run: python fetch_data.py
        env:
          PYTHONUNBUFFERED: "1"   # принудителен flush на print()

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "data: momentum update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          )
