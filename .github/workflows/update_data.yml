name: Update MomentumRank Data

on:
  schedule:
    - cron: "37 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance==0.2.54 pandas numpy lxml html5lib curl_cffi

      - name: Run fetch_data.py
        run: python fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "data: momentum update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          )
